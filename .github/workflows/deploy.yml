# Build the Astro site and publish to GitHub Pages.
# One-time setup in the repo: Settings → Pages → "Build and deployment" →
# Source = "GitHub Actions". After that, every push to main deploys.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel any in-flight deploy when a new push lands.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        # Optional: set ANALYTICS_SRC here to enable first-party analytics on
        # the deployed build, e.g. a self-hosted Plausible/Umami script.
        # env:
        #   ANALYTICS_SRC: https://a.concertim.com/script.js
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4