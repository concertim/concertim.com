baseURL: https://concertim.com/
languageCode: en-gb
#title: Concertim
theme: hugo-saasify-theme

# Required Features
pygmentsCodeFences: true  # Enable syntax highlighting
pygmentsUseClasses: true
enableEmoji: true        # Enable emoji support
enableGitInfo: true      # Enable Git info for lastmod

# Required Build Configuration
build:
  writeStats: true

taxonomies:
  category: categories
  tag: tags
params:
  description: ""
  author: Concertim Team
  logo: /images/cIM_Icon_01.png
  cta:
    enable: true
    title: Ready to Start Your Supercomputing Subscription?
    description: Begin your journey into affordable, sustainable HPC & AI
    gradient_from: "#ff7401" 
    gradient_to: "#ffab66" 
    gradient_angle: 75
    primary_button:
      text: Register Your Interest
      url: /contact
    secondary_button:
      text: Learn More
      url: /subscriptions
  footer:
    column_2_title: COMPANY
    column_3_title: LEGAL
  header:
    background: bg-white/80 backdrop-blur-sm
    border: border-b border-gray-100
    logo:
      src: /images/cIM_Logo_01.png
    menu:
      spacing: space-x-8
      dropdown:
        width: w-72
        container_padding: py-6
        item_padding: px-8 py-3
        background: bg-white
        border: border border-gray-100
        shadow: shadow-xl
        radius: rounded-lg
        text_color: text-gray-700
        hover_background: hover:bg-gray-50
        text_size: text-sm
    buttons:
      getStarted:
        text: Register Interest
        url: /contact
  blog:
    enable: false
    title: Latest Articles
    subtitle: Learn more about web development and best practices
    cta:
      enable: true
    sidebar:
      recent:
        enable: true
        title: Recent Articles
        count: 5
      categories:
        enable: true
        title: Categories
      tags:
        enable: true
        title: Popular Tags
        count: 20
      subscribe:
        enable: true
        title: Subscribe to Newsletter
        description: Get the latest posts delivered right to your inbox
        action: https://formspree.io/f/your-form-id
        emailName: email
        buttonText: Subscribe
        placeholder: Enter your email
        disclaimer: We respect your privacy. Unsubscribe at any time.
module:
  hugoVersion:
    extended: true
    min: 0.80.0
  imports:
    - path: github.com/hugo-mods/icons
build:
  writeStats: true
  buildStats:
    enable: true
security:
  funcs:
    getenv:
      - ^HUGO_
      - ^CI$
markup:
  highlight:
    noClasses: false
    lineNos: true
    codeFences: true
    guessSyntax: true
    lineNumbersInTable: true
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    endLevel: 3
    ordered: false
    startLevel: 2
menu:
  main:
    - name: About
      weight: 3
      url: /about/
    - name: Why ConcertIM?
      weight: 1
      url: /why-concertim/
    - name: Subscriptions
      weight: 2
      url: /subscriptions/
  footer_column_2:
    - name: About Us
      url: /about
  footer_column_3:
    - name: Terms & Conditions
      url: /terms-and-conditions
      weight: 1
    - name: Privacy Policy
      url: /privacy
      weight: 2
