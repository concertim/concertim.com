<div class="value-card {{ if .Get "colour" }}bg-{{ .Get "colour"}}{{ else }}bg-white{{ end }} p-8 rounded-lg shadow-sm hover:shadow-md transition-shadow">
    <div class="mb-4">
        {{ $icon := .Get "icon"}}
        {{ $fa := printf "%s %s" "fas" $icon }}
        {{ partial "icon" (dict "context" . "name" $fa ) }}
    </div>
    <h3 class="text-xl font-bold mb-2">{{ .Get "title" }}</h3>
    <p class="text-gray-600">{{ .Get "description" }}</p>
</div>
{{ partial "icon-data" . }}
